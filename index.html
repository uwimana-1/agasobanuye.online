<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agasobanuye - Stream Movies & Series</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Agasobanuye</h1>
            <div class="nav-right">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search movies or interpreters..." class="search-input">
                    <button id="search-btn" class="search-btn">🔍</button>
                </div>
                <ul class="nav-menu">
                    <li><a href="#featured">Featured</a></li>
                    <li><a href="#popular">Popular</a></li>
                    <li><a href="#series">Series</a></li>
                    <li><a href="#movies">All Movies</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- Search Results Section -->
        <section id="search-results" class="section" style="display: none;">
            <h2 class="section-title">Search Results</h2>
            <div id="search-movies" class="movies-grid movies-grid-compact">
                <!-- Search results will be dynamically inserted here -->
            </div>
        </section>

        <!-- Featured Movies Section -->
        <section id="featured" class="section">
            <div class="section-header">
                <h2 class="section-title">Featured Movies</h2>
                <div class="scroll-controls">
                    <button class="scroll-btn scroll-left" onclick="scrollSection('featured-movies', 'left')">‹</button>
                    <button class="scroll-btn scroll-right" onclick="scrollSection('featured-movies', 'right')">›</button>
                </div>
            </div>
            <div id="featured-movies" class="movies-scroll">
                <!-- Movies will be dynamically inserted here -->
            </div>
        </section>

        <!-- Popular Movies Section -->
        <section id="popular" class="section">
            <div class="section-header">
                <h2 class="section-title">Popular Movies</h2>
                <div class="scroll-controls">
                    <button class="scroll-btn scroll-left" onclick="scrollSection('popular-movies', 'left')">‹</button>
                    <button class="scroll-btn scroll-right" onclick="scrollSection('popular-movies', 'right')">›</button>
                </div>
            </div>
            <div id="popular-movies" class="movies-scroll">
                <!-- Movies will be dynamically inserted here -->
            </div>
        </section>

        <!-- Series Section -->
        <section id="series" class="section">
            <div class="section-header">
                <h2 class="section-title">TV Series</h2>
                <div class="scroll-controls">
                    <button class="scroll-btn scroll-left" onclick="scrollSection('series-movies', 'left')">‹</button>
                    <button class="scroll-btn scroll-right" onclick="scrollSection('series-movies', 'right')">›</button>
                </div>
            </div>
            <div id="series-movies" class="movies-scroll">
                <!-- Movies will be dynamically inserted here -->
            </div>
        </section>

        <!-- All Movies Section -->
        <section id="movies" class="section">
            <h2 class="section-title">All Movies</h2>
            <div id="all-movies" class="movies-grid movies-grid-compact">
                <!-- Movies will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 Agasobanuye. All rights reserved.</p>
            <p class="footer-contact">Contact: 0784854360</p>
        </div>
    </footer>

    <script src="movies.js"></script>
    <script src="app.js"></script>
</body>
</html>
